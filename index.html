<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Flipper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Color Flipper</h1>
        <p class="color-label">Current Color:</p>
        <p id="colorCode" title="Click to copy!">#0A0A0A</p>
        <button id="flipBtn">Flip Color</button>
        <button id="copyBtn">Copy Color</button>
        <button id="resetBtn">Reset</button>

        <p class="color-label" style="margin-top: 40px;">Color History (Last 5):</p>
        <ul id="colorHistory">
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
    </div>

    <script src="script.js"></script>
</body>
</html>
